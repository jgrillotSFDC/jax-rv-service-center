name: release-prod_deploy
# This workflow validates the pull request to main
on:
  push:
    branches:
      - "main"

permissions:
  contents: write

jobs:
  deployment:
    runs-on: ubuntu-latest
    environment: PROD

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Install sfdx-git-delta plugin
        run: echo 'y' | sf plugins install sfdx-git-delta

      - name: Authenticate to sandbox org (SFDX URL)
        env:
          SFDX_URL: ${{ secrets.SFDX_URL }}
        run: |
          if [ -z "$SFDX_URL" ]; then
            echo "Missing required secret: SFDX_URL"
            exit 1
          fi

          echo "$SFDX_URL" > ./sfdx_auth_url.txt
          sf org login sfdx-url \
            --sfdx-url-file ./sfdx_auth_url.txt \
            --alias prod \
            --set-default
          rm -f ./sfdx_auth_url.txt

      - name: Verify authenticated org
        run: sf org list --all

      - name: Build delta package
        id: delta-package
        run: |
          full_build_flag="$(printf '%s' "${{ vars.FULL_BUILD }}" | tr '[:upper:]' '[:lower:]')"

          if [ "$full_build_flag" = "true" ]; then
            echo "FULL_BUILD is true. Using full source directory: force-app"
            echo "has_delta=true" >> "$GITHUB_OUTPUT"
            echo "manifest_path=" >> "$GITHUB_OUTPUT"
            echo "source_dir=force-app" >> "$GITHUB_OUTPUT"
            echo "post_destructive_path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p delta/force-app
          sf sgd source delta \
            --from "HEAD" \
            --to "HEAD~1" \
            --output-dir delta \
            --source-dir force-app \
            --generate-delta

          manifest_path="delta/package/package.xml"
          source_dir="delta/force-app"
          post_destructive_path="delta/destructiveChanges/destructiveChanges.xml"

          has_delta=false

          if [ -f "$manifest_path" ] && grep -q "<types>" "$manifest_path"; then
            has_delta=true
          fi

          if [ -f "$post_destructive_path" ] && grep -q "<types>" "$post_destructive_path"; then
            has_delta=true
          else
            post_destructive_path=""
          fi

          if [ "$has_delta" != "true" ]; then
            echo "No metadata changes detected in delta package."
          fi

          echo "has_delta=$has_delta" >> "$GITHUB_OUTPUT"
          echo "manifest_path=$manifest_path" >> "$GITHUB_OUTPUT"
          echo "source_dir=$source_dir" >> "$GITHUB_OUTPUT"
          echo "post_destructive_path=$post_destructive_path" >> "$GITHUB_OUTPUT"

      - name: Build Apex test class list
        id: apex-tests
        run: |
          if [ "${{ steps.delta-package.outputs.has_delta }}" != "true" ]; then
            echo "No delta changes to validate."
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "test_classes=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t test_files < <(find "${{ steps.delta-package.outputs.source_dir }}" -type f -name '*TEST*.cls' | sort)

          if [ "${#test_files[@]}" -eq 0 ]; then
            echo "No Apex test classes matching '*TEST*.cls' were found in ${{ steps.delta-package.outputs.source_dir }}."
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "test_classes=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          test_classes=$(printf '%s\n' "${test_files[@]}" \
            | sed -E 's|.*/([^/]+)\.cls$|\1|' \
            | paste -sd, -)

          echo "Found Apex test classes: $test_classes"
          echo "has_tests=true" >> "$GITHUB_OUTPUT"
          echo "test_classes=$test_classes" >> "$GITHUB_OUTPUT"

      - name: Deploy build
        run: |
          full_build_flag="$(printf '%s' "${{ vars.FULL_BUILD }}" | tr '[:upper:]' '[:lower:]')"

          if [ "$full_build_flag" = "true" ]; then
            deploy_cmd=(sf project deploy start --target-org prod --source-dir "${{ steps.delta-package.outputs.source_dir }}")
          else
            if [ "${{ steps.delta-package.outputs.has_delta }}" != "true" ]; then
              echo "Skipping validation because there are no delta changes."
              exit 0
            fi

            deploy_cmd=(sf project deploy start --target-org prod --manifest "${{ steps.delta-package.outputs.manifest_path }}")

            if [ -n "${{ steps.delta-package.outputs.post_destructive_path }}" ]; then
              deploy_cmd+=(--post-destructive-changes "${{ steps.delta-package.outputs.post_destructive_path }}")
            fi
          fi

          if [ "${{ steps.apex-tests.outputs.has_tests }}" = "true" ]; then
            deploy_cmd+=(--test-level RunSpecifiedTests --tests "${{ steps.apex-tests.outputs.test_classes }}")
          else
            deploy_cmd+=(--test-level "${{ vars.TEST_LEVEL }}")
          fi

          "${deploy_cmd[@]}"

      - name: Build release metadata and notes
        id: release-metadata
        run: |
          before_sha="${{ github.event.before }}"
          after_sha="${{ github.sha }}"

          if [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            commit_range="$after_sha"
          else
            commit_range="$before_sha..$after_sha"
          fi

          timestamp="$(date -u +'%Y-%m-%d %H:%M UTC')"
          short_sha="${after_sha:0:7}"
          tag_name="prod-release-${{ github.run_number }}-${short_sha}"
          release_name="Production Release ${timestamp} (${short_sha})"
          notes_file="release-notes.md"

          {
            echo "## Commits included in this deployment"
            echo
            git log --reverse --pretty=format:'- %s (%h)' "$commit_range"
            echo
            echo
            echo "Deployed commit: \`$after_sha\`"
          } > "$notes_file"

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-metadata.outputs.tag_name }}
          name: ${{ steps.release-metadata.outputs.release_name }}
          body_path: ${{ steps.release-metadata.outputs.notes_file }}
          target_commitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
