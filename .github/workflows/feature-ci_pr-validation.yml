name: feature-ci_pr-validation

on:
  pull_request:
    branches:
      - "develop"

jobs:
  pr-validation:
    runs-on: ubuntu-latest
    environment: CI

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Install sfdx-git-delta plugin
        run: sf plugins install sfdx-git-delta

      - name: Authenticate to sandbox org (SFDX URL)
        env:
          SFDX_URL: ${{ secrets.SFDX_URL }}
        run: |
          if [ -z "$SFDX_URL" ]; then
            echo "Missing required secret: SFDX_URL"
            exit 1
          fi

          echo "$SFDX_URL" > ./sfdx_auth_url.txt
          sf org login sfdx-url \
            --sfdx-url-file ./sfdx_auth_url.txt \
            --alias sandbox \
            --set-default
          rm -f ./sfdx_auth_url.txt

      - name: Verify authenticated org
        run: sf org list --all

      - name: Build Apex test class list
        id: apex-tests
        run: |
          mapfile -t test_files < <(find force-app -type f -name '*TEST*.cls' | sort)

          if [ "${#test_files[@]}" -eq 0 ]; then
            echo "No Apex test classes matching '*TEST*.cls' were found in force-app."
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "test_classes=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          test_classes=$(printf '%s\n' "${test_files[@]}" \
            | sed -E 's|.*/([^/]+)\.cls$|\1|' \
            | paste -sd, -)

          echo "Found Apex test classes: $test_classes"
          echo "has_tests=true" >> "$GITHUB_OUTPUT"
          echo "test_classes=$test_classes" >> "$GITHUB_OUTPUT"

      - name: Validate build
        run: |
          if [ "${{ steps.apex-tests.outputs.has_tests }}" = "true" ]; then
            sf project deploy start --dry-run --test-level RunSpecifiedTests --tests "${{ steps.apex-tests.outputs.test_classes }}" --target-org sandbox --source-dir force-app
          else
            sf project deploy start --dry-run --test-level "${{ vars.TEST_LEVEL }}" --target-org sandbox --source-dir force-app
          fi
