name: feature-release-test_pr-validation
# This workflow validates the pull request to main
on:
  pull_request:
    branches:
      - "main"

jobs:
  pr-validation:
    runs-on: ubuntu-latest
    environment: PROD

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Install sfdx-git-delta plugin
        run: echo 'y' | sf plugins install sfdx-git-delta

      - name: Configure validation org
        id: validation-org
        env:
          SFDX_URL: ${{ secrets.SFDX_URL }}
          SANDBOX_URL: ${{ secrets.SANDBOX_URL }}
          STAGING_ENV: ${{ vars.staging || vars.STAGING || 'prod' }}
        run: |
          staging_env="$(printf '%s' "$STAGING_ENV" | tr '[:upper:]' '[:lower:]')"

          case "$staging_env" in
            sandbox)
              if [ -z "$SANDBOX_URL" ]; then
                echo "Missing required secret for sandbox validation: SANDBOX_URL"
                exit 1
              fi

              echo "$SANDBOX_URL" > ./sandbox_auth_url.txt
              sf org login sfdx-url \
                --sfdx-url-file ./sandbox_auth_url.txt \
                --alias stagingSandbox \
                --set-default
              rm -f ./sandbox_auth_url.txt
              target_org="stagingSandbox"
              ;;
            scratchorg)
              if [ -z "$SFDX_URL" ]; then
                echo "Missing required secret for scratch org creation: SFDX_URL"
                exit 1
              fi

              echo "$SFDX_URL" > ./sfdx_auth_url.txt
              sf org login sfdx-url \
                --sfdx-url-file ./sfdx_auth_url.txt \
                --alias devhubprod \
                --set-default-dev-hub
              rm -f ./sfdx_auth_url.txt

              cat > ./scratch-def.json <<'EOF'
              {
                "orgName": "PR Validation",
                "edition": "Developer"
              }
              EOF

              sf org create scratch \
                --target-dev-hub devhubprod \
                --definition-file ./scratch-def.json \
                --alias prValidationScratch \
                --duration-days 7 \
                --wait 30 \
                --set-default
              rm -f ./scratch-def.json
              target_org="prValidationScratch"
              ;;
            prod|"")
              if [ -z "$SFDX_URL" ]; then
                echo "Missing required secret for prod validation: SFDX_URL"
                exit 1
              fi

              echo "$SFDX_URL" > ./sfdx_auth_url.txt
              sf org login sfdx-url \
                --sfdx-url-file ./sfdx_auth_url.txt \
                --alias devhubprod \
                --set-default-dev-hub \
                --set-default
              rm -f ./sfdx_auth_url.txt
              target_org="devhubprod"
              ;;
            *)
              echo "Invalid vars.staging value: '$STAGING_ENV'. Expected one of: sandbox, scratchOrg, prod."
              exit 1
              ;;
          esac

          echo "staging_env=$staging_env" >> "$GITHUB_OUTPUT"
          echo "target_org=$target_org" >> "$GITHUB_OUTPUT"

      - name: Verify authenticated org
        run: sf org list --all

      - name: Build delta package
        id: delta-package
        run: |
          full_build_flag="$(printf '%s' "${{ vars.FULL_BUILD }}" | tr '[:upper:]' '[:lower:]')"

          if [ "$full_build_flag" = "true" ]; then
            echo "FULL_BUILD is true. Using full source directory: force-app"
            echo "has_delta=true" >> "$GITHUB_OUTPUT"
            echo "manifest_path=" >> "$GITHUB_OUTPUT"
            echo "source_dir=force-app" >> "$GITHUB_OUTPUT"
            echo "post_destructive_path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p delta/force-app
          sf sgd source delta \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}" \
            --output-dir delta \
            --source-dir force-app \
            --generate-delta

          manifest_path="delta/package/package.xml"
          source_dir="delta/force-app"
          post_destructive_path="delta/destructiveChanges/destructiveChanges.xml"

          has_delta=false

          if [ -f "$manifest_path" ] && grep -q "<types>" "$manifest_path"; then
            has_delta=true
          fi

          if [ -f "$post_destructive_path" ] && grep -q "<types>" "$post_destructive_path"; then
            has_delta=true
          else
            post_destructive_path=""
          fi

          if [ "$has_delta" != "true" ]; then
            echo "No metadata changes detected in delta package."
          fi

          echo "has_delta=$has_delta" >> "$GITHUB_OUTPUT"
          echo "manifest_path=$manifest_path" >> "$GITHUB_OUTPUT"
          echo "source_dir=$source_dir" >> "$GITHUB_OUTPUT"
          echo "post_destructive_path=$post_destructive_path" >> "$GITHUB_OUTPUT"

      - name: Build Apex test class list
        id: apex-tests
        run: |
          if [ "${{ steps.delta-package.outputs.has_delta }}" != "true" ]; then
            echo "No delta changes to validate."
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "test_classes=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t test_files < <(find "${{ steps.delta-package.outputs.source_dir }}" -type f -name '*TEST*.cls' | sort)

          if [ "${#test_files[@]}" -eq 0 ]; then
            echo "No Apex test classes matching '*TEST*.cls' were found in ${{ steps.delta-package.outputs.source_dir }}."
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "test_classes=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          test_classes=$(printf '%s\n' "${test_files[@]}" \
            | sed -E 's|.*/([^/]+)\.cls$|\1|' \
            | paste -sd, -)

          echo "Found Apex test classes: $test_classes"
          echo "has_tests=true" >> "$GITHUB_OUTPUT"
          echo "test_classes=$test_classes" >> "$GITHUB_OUTPUT"

      - name: Validate build
        run: |
          full_build_flag="$(printf '%s' "${{ vars.FULL_BUILD }}" | tr '[:upper:]' '[:lower:]')"

          if [ "$full_build_flag" = "true" ]; then
            deploy_cmd=(sf project deploy start --dry-run --target-org "${{ steps.validation-org.outputs.target_org }}" --source-dir "${{ steps.delta-package.outputs.source_dir }}")
          else
            if [ "${{ steps.delta-package.outputs.has_delta }}" != "true" ]; then
              echo "Skipping validation because there are no delta changes."
              exit 0
            fi

            deploy_cmd=(sf project deploy start --dry-run --target-org "${{ steps.validation-org.outputs.target_org }}" --manifest "${{ steps.delta-package.outputs.manifest_path }}")

            if [ -n "${{ steps.delta-package.outputs.post_destructive_path }}" ]; then
              deploy_cmd+=(--post-destructive-changes "${{ steps.delta-package.outputs.post_destructive_path }}")
            fi
          fi

          if [ "${{ steps.apex-tests.outputs.has_tests }}" = "true" ]; then
            deploy_cmd+=(--test-level RunSpecifiedTests --tests "${{ steps.apex-tests.outputs.test_classes }}")
          else
            deploy_cmd+=(--test-level "${{ vars.TEST_LEVEL }}")
          fi

          "${deploy_cmd[@]}"

      - name: Delete scratch org
        if: ${{ always() && steps.validation-org.outputs.staging_env == 'scratchorg' }}
        run: |
          sf org delete scratch \
            --target-org "${{ steps.validation-org.outputs.target_org }}" \
            --no-prompt || true
